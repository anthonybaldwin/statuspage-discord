name: Update lockfile

on:
  pull_request:
    paths:
      - package.json

permissions:
  contents: write

jobs:
  update:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Regenerate bun.lock"
